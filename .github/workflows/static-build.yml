name: Static build

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 01:00 Asia/Shanghai every day.
    - cron: "0 17 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/configure-pages@v5
      - name: Sync data and local assets
        run: npm run sync:data
        env:
          PLAYZONEX_AMAZON_TAG: ${{ secrets.PLAYZONEX_AMAZON_TAG }}
      - name: Commit scheduled data updates
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/generated.json src/data/sync-state.json src/assets/game-covers src/assets/gear src/assets/guide-covers src/assets/downloads
          if git diff --cached --quiet; then
            echo "No data or asset changes to commit."
          else
            git commit -m "Sync PlayZoneX data [skip ci]"
            git push
          fi
      - name: Build static pages
        run: npm run build
        env:
          PLAYZONEX_AMAZON_TAG: ${{ secrets.PLAYZONEX_AMAZON_TAG }}
          PLAYZONEX_GA_ID: ${{ secrets.PLAYZONEX_GA_ID }}
          PLAYZONEX_AD_CLIENT: ${{ secrets.PLAYZONEX_AD_CLIENT }}
          PLAYZONEX_AD_SLOT_TOP: ${{ secrets.PLAYZONEX_AD_SLOT_TOP }}
          PLAYZONEX_AD_SLOT_SIDEBAR: ${{ secrets.PLAYZONEX_AD_SLOT_SIDEBAR }}
          PLAYZONEX_AD_SLOT_INLINE: ${{ secrets.PLAYZONEX_AD_SLOT_INLINE }}
          PLAYZONEX_AD_SLOT_BOTTOM: ${{ secrets.PLAYZONEX_AD_SLOT_BOTTOM }}
          PLAYZONEX_ADS_TXT: ${{ secrets.PLAYZONEX_ADS_TXT }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
